services:
  nginx:
    image: nginx:1.27-alpine
    container_name: nginx_proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - gateway-shared-mesh

networks:
  gateway-shared-mesh:
    external: true
    name: gateway-shared-mesh
