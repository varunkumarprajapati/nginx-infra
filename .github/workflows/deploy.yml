name: Deploy NGINX Config to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Fetch latest repository code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Securely stream files via modern SCP Action
      - name: Copy NGINX Config via Secure SCP
        uses: appleboy/scp-action@v1.0.3 # Matching your working major versioning tier
        with:
          host: ${{ secrets.SSH_HOST }} # Fixed: Changed from SERVER_HOST to match your secrets
          username: ${{ secrets.SSH_USER }} # Fixed: Changed from SERVER_USER to match your secrets
          key: ${{ secrets.SSH_KEY }} # Fixed: Changed from SSH_PRIVATE_KEY to match your secrets
          port: 22
          source: "nginx.conf"
          target: "/tmp" # Safely lands in staging first

      # 3. Handle validation and reload via modern SSH Action
      - name: Verify and Apply Config over SSH
        uses: appleboy/ssh-action@v1.0.3 # Matching your working major versioning tier
        with:
          host: ${{ secrets.SSH_HOST }} # Fixed to match secrets
          username: ${{ secrets.SSH_USER }} # Fixed to match secrets
          key: ${{ secrets.SSH_KEY }} # Fixed to match secrets
          port: 22
          request_pty: true # Handles sudo loops perfectly
          script: |
            # Move file from staging to active NGINX system path
            sudo mv /tmp/nginx.conf /etc/nginx/nginx.conf
            sudo chown root:root /etc/nginx/nginx.conf

            # Run strict syntax checks 
            echo "Verifying NGINX config syntax..."
            if sudo nginx -t; then
              echo "Syntax check passed! Performing graceful reload..."
              sudo systemctl reload nginx
            else
              echo "Critical syntax error found in config. Aborting deployment!"
              exit 1
            fi
